<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="cir-tabs" role="tablist" aria-label="Range">
  <input class="cir-tabs__r" type="radio" name="cir-range" id="cir-r-day" />
  <label class="cir-tabs__t" for="cir-r-day" role="tab">Day</label>

  <input
    class="cir-tabs__r"
    type="radio"
    name="cir-range"
    id="cir-r-week"
    checked=""
  />
  <label class="cir-tabs__t" for="cir-r-week" role="tab">Week</label>

  <input class="cir-tabs__r" type="radio" name="cir-range" id="cir-r-month" />
  <label class="cir-tabs__t" for="cir-r-month" role="tab">Month</label>

  <input class="cir-tabs__r" type="radio" name="cir-range" id="cir-r-year" />
  <label class="cir-tabs__t" for="cir-r-year" role="tab">Year</label>
</div>


</body>
</html>
